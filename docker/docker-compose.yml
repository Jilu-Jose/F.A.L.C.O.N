version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - falcon-network

  server:
    build:
      context: ../server
      dockerfile: ../docker/server.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/falcon
      - JWT_SECRET=your_secret_key_change_me
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - mongodb
      - ml-service
    networks:
      - falcon-network

  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/ml-service.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=model/fraud_model.pkl
    networks:
      - falcon-network

  client:
    build:
      context: ../client
      dockerfile: ../docker/client.Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - falcon-network

networks:
  falcon-network:
    driver: bridge

volumes:
  mongodb_data:
